<svg width="760" height="130" viewBox="0 0 760 130" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#5b6b7a"/>
    </marker>
  </defs>

  <!-- MODEL OUTPUT box -->
  <rect x="10" y="40" width="150" height="50" rx="8" fill="none" stroke="#5b6b7a" stroke-width="1.5"/>
  <text x="85" y="61" text-anchor="middle" font-size="12" fill="#8a97a3">AI PROPOSES</text>
  <text x="85" y="77" text-anchor="middle" font-size="11" fill="#5b6b7a">model output</text>

  <!-- animated dashed line: output -> gate -->
  <line x1="160" y1="65" x2="288" y2="65" stroke="#2fb8a4" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrowhead)">
    <animate attributeName="stroke-dashoffset" from="22" to="0" dur="1.1s" repeatCount="indefinite"/>
  </line>

  <!-- GATE box (pulsing border) -->
  <rect x="295" y="30" width="150" height="70" rx="10" fill="none" stroke="#2fb8a4" stroke-width="2.5">
    <animate attributeName="stroke-width" values="2.5;3.6;2.5" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="1;0.55;1" dur="1.8s" repeatCount="indefinite"/>
  </rect>
  <text x="370" y="60" text-anchor="middle" font-size="13" font-weight="700" fill="#2fb8a4">GATE</text>
  <text x="370" y="78" text-anchor="middle" font-size="10.5" fill="#5b6b7a">deterministic · replayable</text>
  <text x="370" y="92" text-anchor="middle" font-size="10.5" fill="#5b6b7a">no model in the loop</text>

  <!-- two outgoing paths: verified / abstain -->
  <path d="M450,50 C500,35 520,25 560,20" fill="none" stroke="#2fb8a4" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M450,80 C500,95 520,105 560,110" fill="none" stroke="#b5883a" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- VERIFIED outcome -->
  <g>
    <animate attributeName="opacity" values="1;1;0.25;0.25;1" dur="4s" repeatCount="indefinite"/>
    <rect x="565" y="0" width="185" height="38" rx="8" fill="none" stroke="#2fb8a4" stroke-width="1.5"/>
    <text x="657" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#2fb8a4">&#10003; VERIFIED</text>
  </g>

  <!-- ABSTAIN / NEEDS REVIEW outcome -->
  <g>
    <animate attributeName="opacity" values="0.25;0.25;1;1;0.25" dur="4s" repeatCount="indefinite"/>
    <rect x="565" y="92" width="185" height="38" rx="8" fill="none" stroke="#b5883a" stroke-width="1.5"/>
    <text x="657" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#b5883a">ABSTAIN &#8594; human</text>
  </g>
</svg>
